#
# Prologot - SWI-Prolog integration for Godot 4
# GitHub Actions CI workflow for multi-platform builds
#
# This CI pipeline:
# 1. Builds the Prologot extension for Linux, Windows, and macOS across multiple Godot versions
# 2. Runs unit tests to validate the extension
# 3. Packages releases when a version tag is pushed (e.g., v1.0.0)
# 4. Lints GDScript files for code quality
#
# Artifacts are used to:
# - Share compiled binaries between jobs (build → test, build → package)
# - Avoid rebuilding the same binaries multiple times
# - Create release archives from successful builds

name: Build Prologot

on:
  push:
    branches: [master]
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.1.0-beta, etc.
  pull_request:
    branches: [master]
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  # ============================================================================
  # Linux Build Job
  # ============================================================================
  # Builds the extension for Linux x86_64 using the Makefile workflow.
  # The Makefile provides a standard development workflow with automatic
  # dependency detection and management.
  build-linux:
    name: Build (Linux x86_64, Godot ${{ matrix.godot-version }})
    runs-on: ubuntu-latest

    # Build matrix: Test across multiple Godot versions to ensure compatibility.
    # Each version will create a separate build artifact.
    strategy:
      matrix:
        godot-version: ['4.4', '4.5', '4.6']
      fail-fast: false  # Continue other builds even if one fails

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        # Install build tools, SCons (Godot's build system), and SWI-Prolog
        # (required for the Prologot extension to function).
        run: |
          sudo apt-get update
          sudo apt-get install -y swi-prolog swi-prolog-nox build-essential scons

      - name: Build extension
        # On Linux, we use the Makefile which provides a standard development workflow.
        # 'make all' builds both debug and release versions of the extension.
        run: |
          make GODOT_CPP=${{ matrix.godot-version }} all

      - name: Upload Linux artifacts
        # Upload compiled binaries as artifacts for later use in:
        # - Test job: To run unit tests against the compiled extension
        # - Package job: To create release archives
        # Artifacts are stored for 1 day to save storage space.
        uses: actions/upload-artifact@v4
        with:
          name: prologot-linux-x86_64-godot${{ matrix.godot-version }}
          path: bin/
          retention-days: 1

  # ============================================================================
  # Windows Build Job
  # ============================================================================
  # Builds the extension for Windows x86_64 using the Python build script.
  # We use the Python script directly on Windows for better compatibility with
  # the Windows environment (no Unix make available by default).
  build-windows:
    name: Build (Windows x86_64, Godot ${{ matrix.godot-version }})
    runs-on: windows-latest

    strategy:
      matrix:
        godot-version: ['4.4', '4.5', '4.6']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        # SCons is Godot's build system, required for compiling GDExtensions.
        run: |
          python -m pip install scons

      - name: Install SWI-Prolog
        # Use Chocolatey (Windows package manager) to install SWI-Prolog.
        run: |
          choco install swi-prolog --yes
        shell: pwsh

      - name: Build extension
        # On Windows, we use the Python build script directly for better control
        # over the environment and to avoid issues with make on Windows runners.
        # We build both debug and release targets.
        run: |
          python build.py --godot-cpp ${{ matrix.godot-version }} --target template_debug --skip-swi
          python build.py --godot-cpp ${{ matrix.godot-version }} --target template_release --skip-swi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prologot-windows-x86_64-godot${{ matrix.godot-version }}
          path: bin/
          retention-days: 1

  # ============================================================================
  # macOS Build Job
  # ============================================================================
  # Builds universal binaries for macOS (both x86_64 and arm64 architectures).
  # This allows the extension to run natively on both Intel and Apple Silicon Macs.
  build-macos:
    name: Build (macOS universal, Godot ${{ matrix.godot-version }})
    runs-on: macos-latest

    strategy:
      matrix:
        godot-version: ['4.4', '4.5', '4.6']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        # Use Homebrew (macOS package manager) to install SCons and SWI-Prolog.
        run: |
          brew install scons swi-prolog

      - name: Build extension
        # On macOS, we use the Makefile which provides a standard development workflow.
        # 'make all' builds both debug and release versions of the extension.
        run: |
          make GODOT_CPP=${{ matrix.godot-version }} all

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: prologot-macos-universal-godot${{ matrix.godot-version }}
          path: bin/
          retention-days: 1

  # ============================================================================
  # Unit Tests Job
  # ============================================================================
  # Runs unit tests against the compiled Linux extension.
  # Tests are run on Linux only (not all platforms) to save CI time, since
  # the core logic is platform-independent. We test against multiple Godot versions.
  test:
    name: Unit Tests (Godot ${{ matrix.godot-version }})
    runs-on: ubuntu-latest
    needs: build-linux  # Wait for Linux build to complete

    strategy:
      matrix:
        godot-version: ['4.4', '4.5', '4.6']
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SWI-Prolog
        # SWI-Prolog is required at runtime for tests to execute Prolog queries.
        run: |
          sudo apt-get update
          sudo apt-get install -y swi-prolog swi-prolog-nox

      - name: Download Godot Engine
        # Download the specific version of Godot to run tests.
        # We use the official Godot builds from GitHub releases.
        run: |
          wget https://github.com/godotengine/godot/releases/download/${{ matrix.godot-version }}-stable/Godot_v${{ matrix.godot-version }}-stable_linux.x86_64.zip
          unzip Godot_v${{ matrix.godot-version }}-stable_linux.x86_64.zip
          chmod +x Godot_v${{ matrix.godot-version }}-stable_linux.x86_64
          sudo mv Godot_v${{ matrix.godot-version }}-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download build artifacts
        # Download the compiled Linux extension from the build job.
        # Artifacts allow us to reuse compiled binaries without rebuilding.
        uses: actions/download-artifact@v4
        with:
          name: prologot-linux-x86_64-godot${{ matrix.godot-version }}
          path: bin/

      - name: List artifacts
        # Debug step: Verify that artifacts were downloaded correctly.
        run: |
          echo "Contents of bin/:"
          ls -lah bin/

      - name: Run unit tests
        # Execute the test suite using Godot in headless mode.
        # The tests validate core functionality like queries, facts, rules, etc.
        run: |
          godot --headless --script tests/run_tests.gd
        timeout-minutes: 5  # Prevent tests from hanging indefinitely

  # ============================================================================
  # GDScript Linting Job
  # ============================================================================
  # Checks GDScript files for code quality issues and style violations.
  # This helps maintain consistent code style across the project.
  lint-gdscript:
    name: Lint GDScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gdtoolkit
        # gdtoolkit provides gdlint for GDScript static analysis.
        run: |
          pip install gdtoolkit

      - name: Lint GDScript files
        # Run gdlint on addons and tests directories.
        # We allow this to fail without blocking the build (continue-on-error: true)
        # to avoid breaking builds due to style issues.
        run: |
          gdlint addons/ tests/ || true
        continue-on-error: true

  # ============================================================================
  # Release Packaging Job
  # ============================================================================
  # Creates a release package when a version tag is pushed (e.g., v1.0.0).
  # The package includes:
  # - Compiled binaries for all platforms
  # - Addon files (GDScript, plugin configuration)
  # - Documentation (README, LICENSE)
  #
  # Artifacts are used here to collect all platform builds into a single
  # release archive without rebuilding anything.
  package:
    name: Package Release
    needs: [build-linux, build-windows, build-macos, test]  # Wait for all builds and tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')  # Only run on version tags

    # Use a matrix to package builds for each Godot version separately
    strategy:
      matrix:
        godot-version: ['4.4', '4.5', '4.6']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        # Download all platform-specific build artifacts.
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release folder
        # Organize downloaded artifacts into the final release structure:
        # release/
        #   bin/          - Compiled libraries for all platforms
        #   addons/       - Plugin files
        #   prologot.gdextension - Extension configuration
        #   LICENSE, README.md
        run: |
          mkdir -p release/bin
          cp -r artifacts/prologot-linux-x86_64-godot${{ matrix.godot-version }}/* release/bin/ 2>/dev/null || true
          cp -r artifacts/prologot-windows-x86_64-godot${{ matrix.godot-version }}/* release/bin/ 2>/dev/null || true
          cp -r artifacts/prologot-macos-universal-godot${{ matrix.godot-version }}/* release/bin/ 2>/dev/null || true
          cp -r addons release/
          cp prologot.gdextension release/
          cp LICENSE release/
          cp README.md release/

      - name: Create release archive
        # Package everything into a .zip file for distribution.
        run: |
          cd release
          zip -r ../prologot-${{ github.ref_name }}-godot${{ matrix.godot-version }}.zip .

      - name: Create GitHub Release
        # Upload the release archive to GitHub Releases.
        # Pre-release detection: If the tag contains 'alpha', 'beta', or 'rc',
        # mark it as a pre-release.
        uses: softprops/action-gh-release@v2
        with:
          files: prologot-${{ github.ref_name }}-godot${{ matrix.godot-version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true  # Auto-generate release notes from commits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
